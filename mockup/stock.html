<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Pipeline · AllianceCorp Broker Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app-header"></div>

  <main style="max-width:1280px;margin:0 auto;padding:2rem 1.5rem 0;">
    <section style="margin-bottom:1.5rem;">
      <div class="eyebrow">Inventory</div>
      <h1 class="heading hd-display" style="margin-top:0.4rem;">Stock Pipeline</h1>
      <p class="muted" style="margin-top:0.5rem;font-size:0.95rem;max-width:720px;">
        Upcoming AllianceCorp property stock — what your clients can position into.
        Use this view to set expectations on availability, settlement timing, and yield bands.
      </p>
    </section>

    <!-- Filter bar -->
    <section class="card" style="padding:1.25rem;margin-bottom:1.5rem;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1rem;align-items:end;">
        <div>
          <label class="field-label" for="stock-state">State</label>
          <select id="stock-state" class="select">
            <option value="">All states</option>
            <option value="VIC">VIC</option>
            <option value="QLD">QLD</option>
            <option value="NSW">NSW</option>
          </select>
        </div>
        <div>
          <label class="field-label" for="stock-type">Type</label>
          <select id="stock-type" class="select">
            <option value="">All types</option>
            <option value="House & Land">House &amp; Land</option>
            <option value="Townhouse">Townhouse</option>
            <option value="Apartment">Apartment</option>
          </select>
        </div>
        <div>
          <label class="field-label" for="stock-price">Price band</label>
          <select id="stock-price" class="select">
            <option value="">Any</option>
            <option value="0-600000">Under $600k</option>
            <option value="600000-700000">$600k–$700k</option>
            <option value="700000-1500000">Over $700k</option>
          </select>
        </div>
        <div>
          <label class="field-label" for="stock-status">Status</label>
          <select id="stock-status" class="select">
            <option value="">All statuses</option>
            <option value="Available">Available</option>
            <option value="Reserved">Reserved</option>
            <option value="Allocated">Allocated</option>
          </select>
        </div>
      </div>
      <div style="margin-top:0.75rem;display:flex;justify-content:space-between;align-items:center;">
        <div class="muted" style="font-size:0.82rem;" id="stock-result-count"></div>
        <button id="stock-clear" class="btn btn-ghost btn-sm">Clear filters</button>
      </div>
    </section>

    <section id="stock-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem;margin-bottom:3rem;"></section>
    <div id="stock-empty" style="display:none;padding:3rem;text-align:center;" class="muted"></div>
  </main>

  <div id="app-footer"></div>

  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script src="js/stock.js"></script>
</body>
</html>
