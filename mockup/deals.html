<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Deals · AllianceCorp Broker Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app-header"></div>

  <main style="max-width:1280px;margin:0 auto;padding:2rem 1.5rem 0;">
    <section style="margin-bottom:1.5rem;">
      <div class="eyebrow">Pipeline</div>
      <h1 class="heading hd-display" style="margin-top:0.4rem;" id="deals-title">My Deals</h1>
      <p class="muted" style="margin-top:0.5rem;font-size:0.95rem;" id="deals-subtitle"></p>
    </section>

    <!-- Filter bar -->
    <section class="card" style="padding:1.25rem;margin-bottom:1.5rem;">
      <div style="display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:1rem;align-items:end;">
        <div>
          <label class="field-label" for="filter-search">Search by client</label>
          <input id="filter-search" class="input" type="text" placeholder="e.g. Harrison, Patel">
        </div>
        <div>
          <label class="field-label" for="filter-stage">Stage</label>
          <select id="filter-stage" class="select">
            <option value="">All stages</option>
            <option value="PEC">PEC</option>
            <option value="Discovery">Discovery</option>
            <option value="Strategy">Strategy</option>
            <option value="PWP">PWP</option>
            <option value="EOI">EOI</option>
            <option value="Contracts">Contracts</option>
            <option value="Settlement">Settlement</option>
          </select>
        </div>
        <div>
          <label class="field-label" for="filter-finance">Finance status</label>
          <select id="filter-finance" class="select">
            <option value="">All finance</option>
            <option value="Pre-Approval Pending">Pre-Approval Pending</option>
            <option value="Pre-Approval Received">Pre-Approval Received</option>
            <option value="Awaiting Final Approval">Awaiting Final Approval</option>
            <option value="Final Approval Received">Final Approval Received</option>
          </select>
        </div>
        <div>
          <label class="field-label" for="filter-settlement">Settlement</label>
          <select id="filter-settlement" class="select">
            <option value="">Any time</option>
            <option value="30">Next 30 days</option>
            <option value="90">Next 90 days</option>
            <option value="settled">Already settled</option>
          </select>
        </div>
      </div>
      <div style="margin-top:0.75rem;display:flex;align-items:center;justify-content:space-between;">
        <div class="muted" style="font-size:0.82rem;" id="result-count"></div>
        <button id="clear-filters" class="btn btn-ghost btn-sm">Clear filters</button>
      </div>
    </section>

    <!-- Results table -->
    <section class="card" style="overflow:hidden;margin-bottom:3rem;">
      <table class="table" id="deals-table">
        <thead>
          <tr>
            <th>Client</th>
            <th>Stage</th>
            <th>Property</th>
            <th>Settlement</th>
            <th>Finance</th>
            <th>Updated</th>
            <th id="broker-col" style="display:none;">Broker</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="deals-tbody"></tbody>
      </table>
      <div id="empty-state" style="display:none;padding:3rem 1rem;text-align:center;" class="muted"></div>
    </section>
  </main>

  <div id="app-footer"></div>

  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script src="js/deals.js"></script>
</body>
</html>
