<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deal Detail · AllianceCorp Broker Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app-header"></div>

  <main style="max-width:1280px;margin:0 auto;padding:2rem 1.5rem 0;">
    <div id="back-link" style="margin-bottom:1.25rem;">
      <a href="deals.html" class="muted" style="font-size:0.85rem;font-weight:600;">← Back to deals</a>
    </div>

    <!-- Deal header -->
    <section id="deal-header" style="margin-bottom:1.5rem;"></section>

    <!-- Stage progress bar -->
    <section id="stage-progress" class="card" style="padding:1.5rem;margin-bottom:1.5rem;"></section>

    <!-- Tabs -->
    <div class="tabs" id="deal-tabs">
      <button class="tab active" data-tab="overview" type="button">Overview</button>
      <button class="tab" data-tab="finance" type="button">Finance</button>
      <button class="tab" data-tab="property" type="button">Property</button>
      <button class="tab" data-tab="valuation" type="button">Valuation</button>
      <button class="tab" data-tab="documents" type="button">Documents</button>
      <button class="tab" data-tab="activity" type="button">Activity</button>
    </div>

    <section id="tab-content" style="margin-bottom:3rem;"></section>
  </main>

  <div id="app-footer"></div>

  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script src="js/deal-detail.js"></script>
</body>
</html>
